  <rect x="480" y="0" width="720" height="630" fill="url(#imgOverlay)"/>

  <!-- 왼쪽 콘텐츠 영역 -->

  <!-- 상단 로고 영역 -->
  <rect x="60" y="52" width="3" height="32" fill="url(#gold)" rx="2"/>
  <text x="80" y="66" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" font-weight="400" letter-spacing="2">BRAINCITY MEDIPARK</text>
  <text x="80" y="85" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="13" fill="rgba(201,168,76,0.8)" font-weight="600" letter-spacing="1">로제비앙 | 모아엘가</text>

  <!-- 핵심 배지 -->
  <rect x="60" y="118" width="198" height="30" rx="15" fill="rgba(201,168,76,0.15)" stroke="rgba(201,168,76,0.4)" stroke-width="1"/>
  <text x="159" y="137" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="13" fill="#E8C96A" font-weight="700" text-anchor="middle" letter-spacing="0.5">경기도 평택 브레인시티 6BL</text>

  <!-- 메인 타이틀 -->
  <text x="60" y="210" font-family="'Apple SD Gothic Neo','Noto Serif KR',Georgia,serif" font-size="58" fill="#FFFFFF" font-weight="900" letter-spacing="-1">병원이</text>
  <text x="60" y="278" font-family="'Apple SD Gothic Neo','Noto Serif KR',Georgia,serif" font-size="58" fill="#FFFFFF" font-weight="900" letter-spacing="-1">도보 <tspan fill="#E8C96A">3분</tspan>인</text>
  <text x="60" y="346" font-family="'Apple SD Gothic Neo','Noto Serif KR',Georgia,serif" font-size="58" fill="#FFFFFF" font-weight="900" letter-spacing="-1">아파트</text>

  <!-- 구분선 -->
  <rect x="60" y="378" width="280" height="2" fill="url(#gold)" rx="1" opacity="0.6"/>

  <!-- 핵심 수치 3개 -->
  <g>
    <!-- 수치1 -->
    <text x="60" y="420" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="11" fill="rgba(255,255,255,0.45)" font-weight="500" letter-spacing="1">🏫 학교</text>
    <text x="60" y="444" font-family="'Apple SD Gothic Neo','Noto Serif KR',Georgia,serif" font-size="26" fill="#E8C96A" font-weight="900">도보 1분</text>

    <!-- 수치2 -->
    <text x="200" y="420" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="11" fill="rgba(255,255,255,0.45)" font-weight="500" letter-spacing="1">🏥 종합병원</text>
    <text x="200" y="444" font-family="'Apple SD Gothic Neo','Noto Serif KR',Georgia,serif" font-size="26" fill="#E8C96A" font-weight="900">도보 3분</text>


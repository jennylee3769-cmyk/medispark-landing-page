    <text x="60" y="492" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="11" fill="rgba(255,255,255,0.45)" font-weight="500" letter-spacing="1">🚄 GTX·KTX·SRT</text>
    <text x="60" y="516" font-family="'Apple SD Gothic Neo','Noto Serif KR',Georgia,serif" font-size="26" fill="#E8C96A" font-weight="900">광역 교통 수혜</text>

    <text x="310" y="492" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="11" fill="rgba(255,255,255,0.45)" font-weight="500" letter-spacing="1">🏢 총 규모</text>
    <text x="310" y="516" font-family="'Apple SD Gothic Neo','Noto Serif KR',Georgia,serif" font-size="26" fill="#E8C96A" font-weight="900">1,215세대</text>
  </g>

  <!-- 하단 CTA 바 -->
  <rect x="0" y="574" width="1200" height="56" fill="rgba(201,168,76,0.12)" />
  <rect x="0" y="574" width="1200" height="1" fill="rgba(201,168,76,0.3)"/>
  <text x="60" y="609" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="16" fill="#E8C96A" font-weight="700">지금 선착순 동호지정 진행 중</text>
  <text x="400" y="609" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" font-weight="400">  ·  방문 예약 고객 우선 배정</text>
  <text x="900" y="609" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" text-anchor="end">jennylee3769-cmyk.github.io</text>
  <rect x="920" y="586" width="220" height="32" rx="16" fill="rgba(201,168,76,0.25)" stroke="rgba(201,168,76,0.5)" stroke-width="1"/>
  <text x="1030" y="607" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="14" fill="#E8C96A" font-weight="700" text-anchor="middle">📞 무료 상담 예약하기</text>

  <!-- 작은 십자 의료 아이콘 (우측 상단) -->
  <rect x="1120" y="40" width="40" height="10" rx="5" fill="rgba(201,168,76,0.3)"/>
  <rect x="1135" y="25" width="10" height="40" rx="5" fill="rgba(201,168,76,0.3)"/>
</svg>

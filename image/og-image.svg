<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1E3C"/>
      <stop offset="100%" stop-color="#122A50"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#E8C96A"/>
    </linearGradient>
    <linearGradient id="imgOverlay" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A1E3C" stop-opacity="1"/>
      <stop offset="45%" stop-color="#0A1E3C" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0A1E3C" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="imgClip">
      <rect x="480" y="0" width="720" height="630" rx="0"/>
    </clipPath>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 우측 이미지 영역 배경 (실제 이미지 대체용 그라데이션) -->
  <rect x="480" y="0" width="720" height="630" fill="#1c3560"/>

  <!-- 건물 실루엣 장식 (우측 배경) -->
  <rect x="600" y="180" width="60" height="450" fill="rgba(201,168,76,0.06)" rx="4"/>
  <rect x="680" y="130" width="80" height="500" fill="rgba(201,168,76,0.08)" rx="4"/>
  <rect x="780" y="160" width="70" height="470" fill="rgba(201,168,76,0.07)" rx="4"/>

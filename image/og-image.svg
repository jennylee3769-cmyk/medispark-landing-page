    <rect x="640" y="240" width="8" height="10" rx="1"/>
    <rect x="700" y="160" width="10" height="12" rx="1"/>
    <rect x="718" y="160" width="10" height="12" rx="1"/>
    <rect x="736" y="160" width="10" height="12" rx="1"/>
    <rect x="700" y="183" width="10" height="12" rx="1"/>
    <rect x="718" y="183" width="10" height="12" rx="1"/>
    <rect x="736" y="183" width="10" height="12" rx="1"/>
    <rect x="700" y="206" width="10" height="12" rx="1"/>
    <rect x="718" y="206" width="10" height="12" rx="1"/>
    <rect x="736" y="206" width="10" height="12" rx="1"/>
    <rect x="890" y="145" width="12" height="14" rx="1"/>
    <rect x="910" y="145" width="12" height="14" rx="1"/>
    <rect x="930" y="145" width="12" height="14" rx="1"/>
    <rect x="890" y="170" width="12" height="14" rx="1"/>
    <rect x="910" y="170" width="12" height="14" rx="1"/>
    <rect x="930" y="170" width="12" height="14" rx="1"/>
    <rect x="890" y="195" width="12" height="14" rx="1"/>
    <rect x="910" y="195" width="12" height="14" rx="1"/>
    <rect x="930" y="195" width="12" height="14" rx="1"/>

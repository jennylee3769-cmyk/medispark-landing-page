<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>메디스파크 상담 연동 샘플</title>
    <style>
      :root {
        --bg: #f5f2e9;
        --panel: #fffdf8;
        --text: #1f332c;
        --muted: #5a6f67;
        --line: #d9d2c2;
        --brand: #1e6b58;
        --brand-strong: #164f42;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Noto Sans KR", sans-serif;
        background:
          radial-gradient(circle at top right, rgba(30,107,88,0.12), transparent 35%),
          linear-gradient(180deg, #f8f4eb 0%, #f1ecdf 100%);
        color: var(--text);
      }

      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .panel {
        width: min(100%, 520px);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 28px;
        box-shadow: 0 18px 40px rgba(31, 51, 44, 0.10);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 30px;
        line-height: 1.15;
      }

      .sub {
        margin: 0 0 20px;
        color: var(--muted);
        line-height: 1.6;
      }

      .notice {
        background: #eef7f3;
        border: 1px solid #cce4da;
        color: var(--brand-strong);
        border-radius: 10px;
        padding: 14px 16px;
        margin-bottom: 18px;
        line-height: 1.6;
      }

      .grid {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 14px;
        font-weight: 600;
      }

      input, select {
        width: 100%;
        padding: 13px 14px;
        border: 1px solid var(--line);
        border-radius: 10px;
        font: inherit;
        background: white;
      }

      .agree {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        margin-top: 4px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .agree input {
        width: 18px;
        height: 18px;
        margin-top: 2px;
      }

      .actions {
        display: grid;
        gap: 10px;
        margin-top: 18px;
      }

      button, .tel-link {
        appearance: none;
        border: 0;
        border-radius: 10px;
        padding: 14px 16px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
      }

      button {
        background: var(--brand);
        color: white;
      }

      button:disabled {
        opacity: 0.6;
        cursor: wait;
      }

      .tel-link {
        display: none;
        background: #f2ebe0;
        color: var(--text);
      }

      .status {
        min-height: 22px;
        margin-top: 12px;
        font-size: 14px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="panel">
        <h1>상담하기</h1>
        <p class="sub">전화 연결 전에 성함과 연락처만 남겨주시면 상담 내용을 더 빠르게 안내해드립니다.</p>

        <div class="notice">
          입력은 10초 내로 끝납니다. 광고성 연락이 아니라 문의하신 내용 안내와 통화 연결 지연 시 재연락을 위한 최소 정보만 받고 있습니다.
        </div>

        <form id="lead-form" class="grid">
          <label>
            이름
            <input id="name" name="name" type="text" placeholder="이름을 입력해주세요" required>
          </label>

          <label>
            연락처
            <input id="phone" name="phone" type="tel" inputmode="numeric" placeholder="숫자만 입력해주세요" required>
          </label>

          <label>
            관심 타입
            <select id="interest_type" name="interest_type">
              <option value="">선택 안 함</option>
              <option value="84A">84A</option>
              <option value="84B">84B</option>
              <option value="101">101</option>
            </select>
          </label>

          <label>
            상담 유형
            <select id="lead_type" name="lead_type">
              <option value="phone_call">전화상담</option>
              <option value="visit_reservation">방문예약</option>
              <option value="info_request">분양자료 요청</option>
              <option value="modelhouse_view">E모델하우스 문의</option>
            </select>
          </label>

          <label>
            방문 희망일시
            <input id="visit_datetime" name="visit_datetime" type="datetime-local">
          </label>

          <label class="agree">
            <input id="privacy_agreed" name="privacy_agreed" type="checkbox" required>
            <span>개인정보 수집 및 상담 연락에 동의합니다. 입력하신 정보는 상담 목적 외 사용하지 않습니다.</span>
          </label>

          <div class="actions">
            <button id="submit-btn" type="submit">정보 남기고 상담 연결하기</button>
            <a id="call-link" class="tel-link" href="tel:01066892348">010-6689-2348로 전화 연결하기</a>
          </div>

          <div id="status" class="status"></div>
        </form>
      </section>
    </div>

    <script>
      const APPS_SCRIPT_URL = 'PASTE_YOUR_APPS_SCRIPT_WEBAPP_URL_HERE';
      const DEFAULT_DEVELOPER_NAME = '이정임';
      const PAGE_NAME = '메디스파크 분양 홍보 랜딩';
      const PHONE_TARGET = '01066892348';

      const form = document.getElementById('lead-form');
      const statusEl = document.getElementById('status');
      const submitBtn = document.getElementById('submit-btn');
      const callLink = document.getElementById('call-link');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const payload = buildPayload();
        const error = validatePayload(payload);

        if (error) {
          statusEl.textContent = error;
          return;
        }

        submitBtn.disabled = true;
        statusEl.textContent = '정보를 접수하고 있습니다.';

        try {
          if (APPS_SCRIPT_URL.includes('PASTE_YOUR_APPS_SCRIPT_WEBAPP_URL_HERE')) {
            throw new Error('Apps Script URL을 먼저 입력해주세요.');
          }

          const response = await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const data = await response.json();
          if (!data.ok) {
            throw new Error(data.message || '저장 중 오류가 발생했습니다.');
          }

          statusEl.textContent = '접수가 완료되었습니다. 아래 버튼으로 바로 전화 연결하실 수 있습니다.';
          callLink.style.display = 'block';
          callLink.href = `tel:${PHONE_TARGET}`;
          callLink.focus();
        } catch (error) {
          statusEl.textContent = `저장에 실패했습니다. ${error.message} 그래도 아래 번호로 바로 전화 연결은 가능합니다.`;
          callLink.style.display = 'block';
          callLink.href = `tel:${PHONE_TARGET}`;
        } finally {
          submitBtn.disabled = false;
        }
      });

      function buildPayload() {
        const url = new URL(window.location.href);
        return {
          name: document.getElementById('name').value.trim(),
          phone: digitsOnly(document.getElementById('phone').value),
          lead_type: document.getElementById('lead_type').value,
          interest_type: document.getElementById('interest_type').value,
          visit_datetime: document.getElementById('visit_datetime').value,
          developer_name: DEFAULT_DEVELOPER_NAME,
          page_name: PAGE_NAME,
          page_url: window.location.href,
          device_type: window.innerWidth <= 768 ? 'mobile' : 'desktop',
          utm_source: url.searchParams.get('utm_source') || '',
          utm_medium: url.searchParams.get('utm_medium') || '',
          utm_campaign: url.searchParams.get('utm_campaign') || '',
          referrer: document.referrer || '',
          privacy_agreed: document.getElementById('privacy_agreed').checked
        };
      }

      function validatePayload(payload) {
        if (!payload.name) return '이름을 입력해주세요.';
        if (!payload.phone || payload.phone.length < 10) return '연락처를 정확히 입력해주세요.';
        if (!payload.privacy_agreed) return '개인정보 수집 동의가 필요합니다.';
        return '';
      }

      function digitsOnly(value) {
        return String(value || '').replace(/\D/g, '');
      }
    </script>
  </body>
</html>
